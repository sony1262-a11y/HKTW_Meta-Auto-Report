name: Fetch CPAS Report
on:
  workflow_dispatch:
    inputs:
      market:
        description: 'Market'
        required: true
        default: 'ALL'
        type: choice
        options: [ALL, HK, TW]
      date_start:
        description: 'Start date (YYYY-MM-DD)'
        required: true
        type: string
      date_stop:
        description: 'End date (YYYY-MM-DD)'
        required: true
        type: string
      time_increment:
        description: 'Time breakdown'
        required: true
        default: 'monthly'
        type: choice
        options: ['monthly', 'daily']
jobs:
  fetch-cpas:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install requests pandas openpyxl python-dateutil
      - name: Fetch CPAS data
        env:
          META_HK_APP_ID:       ${{ secrets.META_HK_APP_ID }}
          META_HK_APP_SECRET:   ${{ secrets.META_HK_APP_SECRET }}
          META_HK_ACCESS_TOKEN: ${{ secrets.META_HK_ACCESS_TOKEN }}
          META_TW_APP_ID:       ${{ secrets.META_TW_APP_ID }}
          META_TW_APP_SECRET:   ${{ secrets.META_TW_APP_SECRET }}
          META_TW_ACCESS_TOKEN: ${{ secrets.META_TW_ACCESS_TOKEN }}
          PA_UPLOAD_URL:        ${{ secrets.PA_UPLOAD_URL }}
          PA_DOWNLOAD_URL:      ${{ secrets.PA_DOWNLOAD_URL }}
          MARKET:               ${{ github.event.inputs.market }}
          DATE_START:           ${{ github.event.inputs.date_start }}
          DATE_STOP:            ${{ github.event.inputs.date_stop }}
          TIME_INCREMENT:       ${{ github.event.inputs.time_increment }}
          ARTIFACT_DIR:         report_output
        run: |
          mkdir -p report_output
          python scripts/cpas_report.py
      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpas-${{ github.event.inputs.market }}-${{ github.event.inputs.date_start }}-${{ github.event.inputs.date_stop }}-${{ github.event.inputs.time_increment }}
          path: report_output/
          retention-days: 30
