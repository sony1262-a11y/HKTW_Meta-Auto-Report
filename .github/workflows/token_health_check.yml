name: Token Health Check
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 1'
jobs:
  check-tokens:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install requests openpyxl
      - name: Check tokens
        env:
          META_HK_APP_ID:       ${{ secrets.META_HK_APP_ID }}
          META_HK_APP_SECRET:   ${{ secrets.META_HK_APP_SECRET }}
          META_HK_ACCESS_TOKEN: ${{ secrets.META_HK_ACCESS_TOKEN }}
          META_TW_APP_ID:       ${{ secrets.META_TW_APP_ID }}
          META_TW_APP_SECRET:   ${{ secrets.META_TW_APP_SECRET }}
          META_TW_ACCESS_TOKEN: ${{ secrets.META_TW_ACCESS_TOKEN }}
        run: python scripts/token_manager.py
